<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAdR4XaDcs2M7o43j2pu6K1zA3FhCrK-cA",
authDomain: "customerdetailsuniserve.firebaseapp.com",
projectId: "customerdetailsuniserve",
storageBucket: "customerdetailsuniserve.firebasestorage.app",
messagingSenderId: "125960501611",
appId: "1:125960501611:web:4fbbe720ce8a063afbb42e",
measurementId: "G-YK03S135FK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
  
function generateCase(){

let note = `Name : ${name.value}
Phone Number : ${phone.value}
Order ID : ${orderId.value}
Date : ${date.value}
Outlet : ${outlet.value}
Concern : ${issueType.value}
Customer Concern : ${customerConcern.value}
Partner : ${deliveryPartner.value}`;

output.innerText = note;

saveHistory();

} 

async function saveHistory(){

await addDoc(collection(db,"cases"),{

name:name.value,
phone:phone.value,
order:orderId.value,
outlet:outlet.value,
issue:issueType.value,
concern:customerConcern.value,
partner:deliveryPartner.value,
agent:agentSelect.value,
date:new Date().toLocaleString()

});

}

function renderHistory(){

onSnapshot(collection(db,"cases"),(snapshot)=>{

history.innerHTML="";

snapshot.forEach((doc)=>{

const item = doc.data();

history.innerHTML += `
<div class="history-item">

<b>Name:</b> ${item.name}<br>
<b>Order:</b> ${item.order}<br>
<b>Issue:</b> ${item.issue}<br>
<b>Concern:</b> ${item.concern}<br>
<b>Partner:</b> ${item.partner}<br>
<b>Agent:</b> ${item.agent}<br>
<small>${item.date}</small>

</div>
`;

});

});

}

function updateStats(){

onSnapshot(collection(db,"cases"),(snapshot)=>{

let total=0;
let refund=0;
let complaint=0;
let escalation=0;

snapshot.forEach((doc)=>{

const item=doc.data();

total++;

if(item.issue==="Refund Request")
refund++;

if(item.issue.includes("Complaint"))
complaint++;

if(
item.issue.includes("Complaint") ||
item.issue==="Refund Request"
)
escalation++;

});

totalCases.innerText=total;
refundCases.innerText=refund;
complaintCases.innerText=complaint;
escalationCases.innerText=escalation;

});

}

async function downloadCSV(){

const snapshot =
await getDocs(collection(db,"cases"));

let csv =
"Name,Order,Issue,Concern,Partner,Agent,Date\n";

snapshot.forEach((doc)=>{

const d = doc.data();

csv += `"${d.name}","${d.order}","${d.issue}","${d.concern}","${d.partner}","${d.agent}","${d.date}"\n`;

});

const blob =
new Blob([csv],{
type:"text/csv"
});

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"case_history.csv";

link.click();

}

async function copyCase(){

await navigator.clipboard.writeText(
output.innerText
);

alert("Copied");

}

function clearForm(){

document
.querySelectorAll("input,textarea")
.forEach(x=>x.value="");

output.innerText =
"Generated case note will appear here...";

}

function sendCaseToWhatsApp(){

let url =
"https://wa.me/?text=" +
encodeURIComponent(output.innerText);

window.open(url,"_blank");

}
renderHistory();
updateStats();

window.generateCase = generateCase;
window.copyCase = copyCase;
window.clearForm = clearForm;
window.downloadCSV = downloadCSV;
window.sendCaseToWhatsApp = sendCaseToWhatsApp;

</script>
